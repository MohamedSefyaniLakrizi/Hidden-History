name: HiddenHistory

options:
  bundleIdPrefix: com.hiddenhistory
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.4"
  swiftVersion: "6.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "4.0.0"
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: "3.0.0"

targets:
  HiddenHistory:
    type: application
    platform: iOS
    sources:
      - path: HiddenHistory
    resources:
      - path: HiddenHistory/Resources
    info:
      path: HiddenHistory/Info.plist
      properties:
        CFBundleDisplayName: Hidden History
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        NSLocationWhenInUseUsageDescription: "Hidden History uses your location to show historical sites nearby."
        UIAppFonts:
          - Inter-Regular.ttf
          - Inter-Medium.ttf
          - Inter-SemiBold.ttf
          - Inter-Bold.ttf
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        REVENUECAT_API_KEY: $(REVENUECAT_API_KEY)
        POSTHOG_API_KEY: $(POSTHOG_API_KEY)
    settings:
      base:
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.hiddenhistory.app
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_TESTABILITY: YES
        XCCONFIG: $(SRCROOT)/Config.xcconfig
    dependencies:
      - package: Supabase
        product: Supabase
      - package: RevenueCat
        product: RevenueCat
      - package: PostHog
        product: PostHog

  HiddenHistoryTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HiddenHistoryTests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    dependencies:
      - target: HiddenHistory

  HiddenHistoryUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HiddenHistoryUITests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    dependencies:
      - target: HiddenHistory
